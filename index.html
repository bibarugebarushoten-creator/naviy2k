<div class="ofgf-icon-nav">

  <style>
    .ofgf-icon-nav {
      --yellow: #fff83b;
      --cream: #fffde8;
      --ink: #111;
      --red: #e12b2b;

      width: 100%;
      max-width: 980px;
      margin: 24px auto;
      padding: 18px 20px;
      background: var(--yellow);
      border: 3px solid var(--ink);
      box-shadow: 5px 5px 0 var(--ink);
      font-family: Arial, sans-serif;
      position: relative;
      box-sizing: border-box;
      overflow: hidden;
    }

    .ofgf-icon-nav * {
      box-sizing: border-box;
    }

    .ofgf-icon-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .ofgf-icon-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;

      min-height: 145px;
      padding: 14px 10px 10px;

      background: var(--cream);
      border: 2px solid var(--ink);
      border-radius: 14px;

      box-shadow: 4px 4px 0 var(--ink);

      transition:
        transform 0.16s ease,
        box-shadow 0.16s ease,
        background 0.16s ease;

      cursor: pointer;
      overflow: hidden;
    }

    .ofgf-icon-btn:hover {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 var(--ink);
      background: #fff9b8;
    }

    .ofgf-icon-btn:active {
      transform: translate(5px, 5px) scale(0.98);
      box-shadow: none;
    }

    .ofgf-icon-btn img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      transition: transform 0.18s ease;
      pointer-events: none;
    }

    .ofgf-icon-btn:hover img {
      transform: rotate(-4deg) scale(1.08);
    }

    .ofgf-label {
      width: 100%;
      margin-top: 10px;
      padding: 7px 6px;

      background: #111;
      color: var(--yellow);

      font-size: 12px;
      font-weight: 900;
      line-height: 1.15;
      text-align: center;
      text-transform: lowercase;

      border-radius: 3px;

      pointer-events: none;
    }

    .ofgf-random-btn {
      border: 2px solid var(--ink);
    }

    .ofgf-corner-sparkle {
      position: absolute;
      top: 9px;
      right: 12px;

      font-size: 16px;
      letter-spacing: 5px;

      pointer-events: none;

      animation: ofgfTwinkle 1.2s infinite alternate;
    }

    @keyframes ofgfTwinkle {
      from {
        opacity: 0.35;
        transform: translateY(0);
      }
      to {
        opacity: 1;
        transform: translateY(-2px);
      }
    }

    .ofgf-bottom-note {
      margin-top: 16px;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;

      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.5px;

      color: var(--ink);
      text-align: center;
    }

    .ofgf-bottom-note:before,
    .ofgf-bottom-note:after {
      content: "";
      flex: 1;
      border-top: 2px dotted var(--ink);
      max-width: 220px;
    }

    .ofgf-random-result {
      display: none;

      margin-top: 14px;
      padding: 11px 13px;

      background: #111;
      color: #fff;

      border: 2px solid #111;

      box-shadow: 3px 3px 0 var(--red);

      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .ofgf-random-link {
      color: var(--yellow);
      text-decoration: underline;
      cursor: pointer;
      font-weight: 900;
    }

    .ofgf-click-sparkle {
      position: absolute;
      width: 8px;
      height: 8px;
      pointer-events: none;
      z-index: 999;
      animation: ofgfPopSparkle 650ms ease-out forwards;
    }

    .ofgf-click-sparkle:before {
      content: "✦";

      position: absolute;
      left: -5px;
      top: -8px;

      font-size: 18px;

      color: var(--red);

      text-shadow: 1px 1px 0 #fff;
    }

    @keyframes ofgfPopSparkle {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(0.4) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(1.6) rotate(40deg);
      }
    }

    /* MOBILE */

    @media (max-width: 760px) {

      .ofgf-icon-nav {
        padding: 14px;
      }

      .ofgf-icon-row {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .ofgf-icon-btn {
        min-height: 125px;
        padding: 12px 8px 9px;
      }

      .ofgf-icon-btn img {
        width: 58px;
        height: 58px;
      }

      .ofgf-label {
        font-size: 11px;
        padding: 7px 5px;
      }

      .ofgf-random-btn {
        grid-column: span 2;
      }
    }

    @media (max-width: 380px) {

      .ofgf-icon-row {
        gap: 10px;
      }

      .ofgf-icon-btn {
        min-height: 118px;
      }

      .ofgf-icon-btn img {
        width: 52px;
        height: 52px;
      }
    }

  </style>

  <div class="ofgf-corner-sparkle">
    ✦ ✧ ★ ✦
  </div>

  <div class="ofgf-icon-row">

    <!-- RECS -->

    <div
      class="ofgf-icon-btn"
      onclick="window.top.location.href='https://officialgf.com/category/recommendations/'"
    >
      <img
        src="https://officialgf.com/wp-content/uploads/2026/05/5f79d21158ff43a11d020b8b30e8c168.jpg"
        alt="recs"
      >

      <span class="ofgf-label">
        recommends! ›
      </span>
    </div>

    <!-- MAP -->

    <div
      class="ofgf-icon-btn"
      onclick="window.top.location.href='https://officialgf.com/livehouse-map/'"
    >
      <img
        src="https://officialgf.com/wp-content/uploads/2026/05/2f5f5005556af548d1ee3804f087705f.jpg"
        alt="Live Music Guide"
      >

      <span class="ofgf-label">
        live scene map and guide ›
      </span>
    </div>

    <!-- ABOUT -->

    <div
      class="ofgf-icon-btn"
      onclick="window.top.location.href='https://officialgf.com/about/'"
    >
      <img
        src="https://officialgf.com/wp-content/uploads/2026/05/1d8558b5a5f6947071c3df4032904193.jpg"
        alt="Author"
      >

      <span class="ofgf-label">
        author? ›
      </span>
    </div>

    <!-- PLAYLIST -->

    <div
      class="ofgf-icon-btn"
      onclick="window.top.location.href='https://officialgf.com/playlist/'"
    >
      <img
        src="https://officialgf.com/wp-content/uploads/2026/04/picgifs-ipod-3447152.gif"
        alt="Playlist Page"
      >

      <span class="ofgf-label">
        playlist page ›
      </span>
    </div>

    <!-- RANDOM -->

    <button
      class="ofgf-icon-btn ofgf-random-btn"
      type="button"
      onclick="ofgfRandomPick(event)"
    >
      <img
        src="https://officialgf.com/wp-content/uploads/2026/05/389bf070cfba83b458d87508deb72681.jpg"
        alt="Random"
      >

      <span class="ofgf-label">
        random ›
      </span>
    </button>

  </div>

  <!-- RANDOM RESULT -->

  <div
    class="ofgf-random-result"
    id="ofgf-random-result"
  ></div>

  <!-- BOTTOM TEXT -->

  <div class="ofgf-bottom-note">
    ✧ find your next favorite! ✧
  </div>

  <script>

    const ofgfRandomLinks = [

      {
        title: "All About Funk and City Pop",
        url: "https://officialgf.com/2025/04/10/japan-soul/"
      },

      {
        title: "My Favorite Underrated Artist",
        url: "https://officialgf.com/2025/05/15/ako-japans-most-underrated-pop-artist-in-2025/"
      },

      {
        title: "Faceless Singers",
        url: "https://officialgf.com/2025/08/07/faceless-singers/"
      },

      {
        title: "Music Festivals: What to Bring",
        url: "https://officialgf.com/2025/07/22/what-to-bring/"
      },

      {
        title: "Recs",
        url: "https://officialgf.com/category/recommendations/"
      },

      {
        title: "Best Bassists in Japan",
        url: "https://officialgf.com/2026/03/07/5-japanese-bassists-you-should-know/"
      }

    ];

    function ofgfRandomPick(event) {

      const pick =
        ofgfRandomLinks[
          Math.floor(Math.random() * ofgfRandomLinks.length)
        ];

      const result =
        document.getElementById("ofgf-random-result");

      result.style.display = "block";

      result.innerHTML = `
        ✦ Random pick:
        <span
          class="ofgf-random-link"
          onclick="window.top.location.href='${pick.url}'"
        >
          ${pick.title} →
        </span>
      `;

      ofgfSparkleBurst(event);
    }

    document
      .querySelectorAll(".ofgf-icon-btn")
      .forEach(function(button) {

        button.addEventListener(
          "click",
          function(event) {
            ofgfSparkleBurst(event);
          }
        );

      });

    function ofgfSparkleBurst(event) {

      const button =
        event.currentTarget;

      const rect =
        button.getBoundingClientRect();

      for (let i = 0; i < 8; i++) {

        const sparkle =
          document.createElement("span");

        sparkle.className =
          "ofgf-click-sparkle";

        sparkle.style.left =
          event.clientX - rect.left + "px";

        sparkle.style.top =
          event.clientY - rect.top + "px";

        sparkle.style.setProperty(
          "--x",
          (Math.random() * 70 - 35) + "px"
        );

        sparkle.style.setProperty(
          "--y",
          (Math.random() * -70 - 10) + "px"
        );

        button.appendChild(sparkle);

        setTimeout(function() {
          sparkle.remove();
        }, 700);

      }

    }

  </script>

</div>

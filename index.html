<div class="ofgf-icon-nav">
  <style>
    .ofgf-icon-nav {
      --yellow: #fff83b;
      --cream: #fffde8;
      --ink: #111;
      --red: #e12b2b;
      --purple: #9b7cff;

      width: 100%;
      max-width: 980px;
      margin: 24px auto;
      padding: 18px 20px;
      background: var(--yellow);
      border: 3px solid var(--ink);
      box-shadow: 5px 5px 0 var(--ink);
      font-family: Arial, sans-serif;
      position: relative;
      box-sizing: border-box;
      overflow: hidden;
    }

    .ofgf-icon-nav * {
      box-sizing: border-box;
    }

    .ofgf-icon-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .ofgf-icon-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 145px;
      padding: 14px 10px 10px;
      background: var(--cream);
      border: 2px solid var(--ink);
      border-radius: 14px;
      box-shadow: 4px 4px 0 var(--ink);
      color: var(--ink);
      text-decoration: none;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
      cursor: pointer;
      overflow: hidden;
    }

    .ofgf-icon-btn:hover {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 var(--ink);
      background: #fff9b8;
    }

    .ofgf-icon-btn:active {
      transform: translate(5px, 5px) scale(0.98);
      box-shadow: none;
    }

    .ofgf-icon-btn img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      image-rendering: auto;
      transition: transform 0.18s ease;
    }

    .ofgf-icon-btn:hover img {
      transform: rotate(-4deg) scale(1.08);
    }

    .ofgf-label {
      width: 100%;
      margin-top: 10px;
      padding: 7px 6px;
      background: #111;
      color: var(--yellow);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      text-transform: lowercase;
      letter-spacing: 0.2px;
      border-radius: 3px;
    }

    .ofgf-random-btn {
      border: 0;
      font-family: inherit;
    }

    .ofgf-corner-sparkle {
      position: absolute;
      top: 9px;
      right: 12px;
      font-size: 16px;
      letter-spacing: 5px;
      pointer-events: none;
      animation: ofgfTwinkle 1.2s infinite alternate;
    }

    @keyframes ofgfTwinkle {
      from {
        opacity: 0.35;
        transform: translateY(0);
      }
      to {
        opacity: 1;
        transform: translateY(-2px);
      }
    }

    .ofgf-bottom-note {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: var(--ink);
      text-align: center;
    }

    .ofgf-bottom-note:before,
    .ofgf-bottom-note:after {
      content: "";
      flex: 1;
      border-top: 2px dotted var(--ink);
      max-width: 220px;
    }

    .ofgf-random-result {
      display: none;
      margin-top: 14px;
      padding: 11px 13px;
      background: #111;
      color: #fff;
      border: 2px solid #111;
      box-shadow: 3px 3px 0 var(--red);
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .ofgf-random-result a {
      color: var(--yellow);
      font-weight: 900;
      text-decoration: underline;
    }

    .ofgf-click-sparkle {
      position: absolute;
      width: 8px;
      height: 8px;
      pointer-events: none;
      z-index: 999;
      animation: ofgfPopSparkle 650ms ease-out forwards;
    }

    .ofgf-click-sparkle:before {
      content: "✦";
      position: absolute;
      left: -5px;
      top: -8px;
      font-size: 18px;
      color: var(--red);
      text-shadow: 1px 1px 0 #fff;
    }

    @keyframes ofgfPopSparkle {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(0.4) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(1.6) rotate(40deg);
      }
    }

    @media (max-width: 760px) {
      .ofgf-icon-row {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .ofgf-icon-btn {
        min-height: 130px;
      }

      .ofgf-icon-btn img {
        width: 62px;
        height: 62px;
      }
    }

    @media (max-width: 500px) {
      .ofgf-icon-nav {
        padding: 14px;
      }

      .ofgf-icon-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>

  <div class="ofgf-corner-sparkle">✦ ✧ ★ ✦</div>

  <div class="ofgf-icon-row">
    <a class="ofgf-icon-btn" href="/request/">
      <img src="https://officialgf.com/wp-content/uploads/2026/05/5f79d21158ff43a11d020b8b30e8c168.jpg" alt="recs">
      <span class="ofgf-label">recommends! ›</span>
    </a>

    <a class="ofgf-icon-btn" href="/live-music-guide/">
      <img src="LIVE-MUSIC-GUIDE-IMAGE-URL-HERE" alt="Live Music Guide">
      <span class="ofgf-label">live music guide ›</span>
    </a>

    <a class="ofgf-icon-btn" href="/about/">
      <img src="AUTHOR-IMAGE-URL-HERE" alt="Author">
      <span class="ofgf-label">author? ›</span>
    </a>

    <a class="ofgf-icon-btn" href="/playlists/">
      <img src="https://officialgf.com/wp-content/uploads/2026/04/picgifs-ipod-3447152.gif" alt="Playlist Page">
      <span class="ofgf-label">playlist page ›</span>
    </a>

    <button class="ofgf-icon-btn ofgf-random-btn" type="button" onclick="ofgfRandomPick(event)">
      <img src="https://officialgf.com/wp-content/uploads/2026/05/389bf070cfba83b458d87508deb72681.jpg" alt="Random">
      <span class="ofgf-label">random ›</span>
    </button>
  </div>

  <div class="ofgf-random-result" id="ofgf-random-result"></div>

  <div class="ofgf-bottom-note">
    ✧ discover new sounds. follow the rabbit hole. ✧
  </div>

  <script>
    const ofgfRandomLinks = [
      { title: "Tokyo Live House Scene Map", url: "/scene-map/" },
      { title: "Playlist Page", url: "/playlists/" },
      { title: "New Japanese Music Finds", url: "/blog/" },
      { title: "Live Music Guide", url: "/live-music-guide/" },
      { title: "Artist Deep Dives", url: "/category/artist-deep-dives/" },
      { title: "Vocaloid + Internet Music", url: "/category/vocaloid/" }
    ];

    function ofgfRandomPick(event) {
      const pick = ofgfRandomLinks[Math.floor(Math.random() * ofgfRandomLinks.length)];
      const result = document.getElementById("ofgf-random-result");

      result.style.display = "block";
      result.innerHTML = `✦ Random pick: <a href="${pick.url}">${pick.title} →</a>`;

      ofgfSparkleBurst(event);
    }

    document.querySelectorAll(".ofgf-icon-btn").forEach(function(button) {
      button.addEventListener("click", function(event) {
        ofgfSparkleBurst(event);
      });
    });

    function ofgfSparkleBurst(event) {
      const button = event.currentTarget;
      const rect = button.getBoundingClientRect();

      for (let i = 0; i < 8; i++) {
        const sparkle = document.createElement("span");
        sparkle.className = "ofgf-click-sparkle";

        sparkle.style.left = event.clientX - rect.left + "px";
        sparkle.style.top = event.clientY - rect.top + "px";
        sparkle.style.setProperty("--x", (Math.random() * 70 - 35) + "px");
        sparkle.style.setProperty("--y", (Math.random() * -70 - 10) + "px");

        button.appendChild(sparkle);

        setTimeout(function() {
          sparkle.remove();
        }, 700);
      }
    }
  </script>
</div>
